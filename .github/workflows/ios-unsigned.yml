name: ios-unsigned-ipa

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    env:
      IOS_SCHEME: SillyMicNative
      IOS_WORKSPACE: ios/SillyMicNative.xcworkspace
      ARCHIVE_PATH: build/SillyMicMobile.xcarchive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Pack unsigned IPA
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -n 1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          /usr/bin/zip -r SillyMicMobile-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillymic-mobile-unsigned-ipa
          path: mobile/build/SillyMicMobile-unsigned.ipa
